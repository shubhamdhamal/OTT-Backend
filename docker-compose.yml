version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
#  OTT Backend — Production Docker Compose
#  Services: web (Gunicorn) · celery · redis
#  External: Supabase PostgreSQL · Cloudflare R2
# ─────────────────────────────────────────────────────────────────────────────

x-common: &common
  build: .
  restart: unless-stopped
  env_file: .env
  volumes:
    - media_data:/app/media
    - hls_tmp:/tmp/hls_videos
    - logs:/var/log/ott
  depends_on:
    redis:
      condition: service_healthy

services:

  # ── Redis (Celery broker + result backend) ────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "127.0.0.1:6379:6379"   # bind to localhost only — not exposed publicly
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  # ── Django / Gunicorn ─────────────────────────────────────────────────────
  web:
    <<: *common
    ports:
      - "127.0.0.1:8000:8000"   # Nginx reverse-proxies to this
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Celery worker (HLS video encoding) ───────────────────────────────────
  celery:
    <<: *common
    command: >
      celery -A ott_backend worker
        --loglevel=info
        --concurrency=2
        --max-tasks-per-child=10
        -Q celery
    healthcheck:
      test: ["CMD", "celery", "-A", "ott_backend", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 60s
      timeout: 20s
      start_period: 30s
      retries: 3

  # ── Celery Beat (optional periodic tasks) ────────────────────────────────
  # Uncomment if you add periodic cleanup tasks
  # celery-beat:
  #   <<: *common
  #   command: celery -A ott_backend beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

volumes:
  media_data:
  hls_tmp:
  logs:
  redis_data:
